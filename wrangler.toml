name = "mails-gtm-agent"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[[d1_databases]]
binding = "DB"
database_name = "mails-gtm"
database_id = "YOUR_D1_DATABASE_ID"  # wrangler d1 create mails-gtm

# v1: send queue (shared by sequence + agent engines)
[[queues.producers]]
binding = "SEND_QUEUE"
queue = "mails-gtm-send"

[[queues.consumers]]
queue = "mails-gtm-send"
max_batch_size = 10
max_retries = 3
dead_letter_queue = "mails-gtm-dlq-send"

# v2: evaluate queue (agent engine only)
[[queues.producers]]
binding = "EVALUATE_QUEUE"
queue = "mails-gtm-evaluate"

[[queues.consumers]]
queue = "mails-gtm-evaluate"
max_batch_size = 10
max_retries = 3
dead_letter_queue = "mails-gtm-dlq-evaluate"

# Dead letter queues — messages that exhaust max_retries land here instead of being dropped
[[queues.consumers]]
queue = "mails-gtm-dlq-send"
max_batch_size = 10
max_retries = 0

[[queues.consumers]]
queue = "mails-gtm-dlq-evaluate"
max_batch_size = 10
max_retries = 0

# Service binding to mails-worker (avoids error 1042 on worker-to-worker calls)
[[services]]
binding = "MAILS_WORKER"
service = "mails-worker"

[triggers]
crons = ["* * * * *"]
