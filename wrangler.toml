name = "mails-gtm-agent"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[[d1_databases]]
binding = "DB"
database_name = "mails-gtm"
database_id = "YOUR_D1_DATABASE_ID"

[[queues.producers]]
binding = "SEND_QUEUE"
queue = "mails-gtm-send"

[[queues.consumers]]
queue = "mails-gtm-send"
max_batch_size = 1
max_retries = 3

[triggers]
crons = ["* * * * *", "*/5 * * * *"]
